# 测试环境配置：用 H2 替代 MySQL，其他服务指向 localhost
server:
  port: 8080

spring:
  # 数据源：用 H2 内存数据库替代 MySQL
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MYSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # 关闭 schema 自动初始化（H2 无需 schema.sql）
  sql:
    init:
      mode: never

  # MongoDB 配置（指向本地 Docker 或本地安装）
  data:
    mongodb:
      uri: mongodb://admin:admin123@localhost:27017/junle_chat?authSource=admin
    redis:
      host: localhost
      port: 6379
      password: redis123
      database: 0

  # RabbitMQ
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  # ElasticSearch
  elasticsearch:
    uris: http://localhost:9200

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Redisson
redisson:
  single-server-config:
    address: redis://localhost:6379
    password: redis123
    database: 0

# Milvus（禁用）
milvus:
  uri: http://localhost:19530
  collection: job_vectors
  dimension: 1024

# AI 配置（测试不实际调用）
ai:
  api-key: test-key
  api-url: http://localhost:9999
  model: test-model
  timeout: 5

deepseek:
  api-key: test-key
  api-url: http://localhost:9999
  model: test-model
  timeout: 5

dashscope:
  api-key: test-key
  model: text-embedding-v3
  dimension: 1024

# JWT
jwt:
  secret: test-secret-key-must-be-at-least-256-bits-long-2026
  expiration: 604800000

# MinIO
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin123
  bucket: resumes
